# Terminal forge runner settings.
# Boolean values: true/false, yes/no, on/off, 1/0.

animation.enabled=true
animation.fps=30
animation.intensity=9
animation.charset= .:^*xsS#$
animation.width_ratio=3
animation.border.enabled=true

status.banner.enabled=true
status.text.color=white

# Curses color names: black, red, orange, green, yellow, blue, magenta, cyan, white.
# Note: curses maps orange to yellow in standard 8-color terminals.
# Built-in flame palettes:
# blue      -> black, blue, cyan, white
# red       -> red, orange, yellow, white
# green     -> black, green, cyan, white
# cyan      -> black, cyan, white, white
# purple    -> black, magenta, cyan, white
# yellow    -> red, yellow, white, white
# grayscale -> black, black, white, white
flame.palette=cyan

# Optional UI color overrides. Leave commented to use the dominant palette color.
# status.banner.color=yellow
# border.color=yellow

# Optional per-stop overrides. Leave commented to use flame.palette.
# gradient.low=red
# gradient.mid=orange
# gradient.hot=yellow
# gradient.core=cyan

# gradient.low=black
# gradient.mid=blue
# gradient.hot=cyan
# gradient.core=white
